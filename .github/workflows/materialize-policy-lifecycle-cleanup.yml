name: Materialize policy lifecycle cleanup

on:
  push:
    branches:
      - agent/policy-lifecycle-cleanup
    paths:
      - scripts/migrate-policy-lifecycle-2026-07.mjs
      - scripts/migrate-policy-lifecycle-2026-07.test.mjs
      - package.json
      - .github/workflows/materialize-policy-lifecycle-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate-sqlite:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/policy-lifecycle-cleanup
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Apply SQLite migration and capture result
        id: migrate
        shell: bash
        run: |
          mkdir -p docs
          set +e
          pnpm manage:db:migrate:policy-lifecycle 2>&1 | tee /tmp/policy-lifecycle-migration.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "# Policy lifecycle migration run"
            echo
            echo "- Date: 2026-07-21"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Exit status: ${status}"
            echo
            echo '```text'
            cat /tmp/policy-lifecycle-migration.log
            echo '```'
          } > docs/policy-lifecycle-migration-run.md
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Commit SQLite result and migration log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            docs/policy-lifecycle-migration-run.md
          git commit -m "chore(data): apply policy lifecycle SQLite migration"
          git push origin HEAD:agent/policy-lifecycle-cleanup

      - name: Fail when migration failed
        if: steps.migrate.outputs.status != '0'
        run: exit 1
