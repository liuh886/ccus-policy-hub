name: Materialize policy lifecycle cleanup

on:
  push:
    branches:
      - agent/policy-lifecycle-cleanup
    paths:
      - .github/workflows/materialize-policy-lifecycle-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-outputs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/policy-lifecycle-cleanup
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Regenerate governed outputs and capture result
        id: regenerate
        shell: bash
        run: |
          mkdir -p docs
          set +e
          (
            set -e
            pnpm manage:db:audit:deep
            pnpm manage:db:export:md:clean
            pnpm manage:db:quality:export
            pnpm manage:db:data:export
            pnpm prettier --write \
              "src/content/policies/**/*.md" \
              "public/data/*.json" \
              src/data/quality_metrics.generated.json
            pnpm lint
            pnpm test
            pnpm astro check
            pnpm build
          ) 2>&1 | tee /tmp/policy-lifecycle-materialization.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "# Policy lifecycle materialization run"
            echo
            echo "- Date: 2026-07-21"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Exit status: ${status}"
            echo
            echo '```text'
            cat /tmp/policy-lifecycle-materialization.log
            echo '```'
          } > docs/policy-lifecycle-materialization-run.md
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Commit regenerated outputs and run log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            src/content/policies \
            src/data/quality_metrics.generated.json \
            public/data \
            docs/policy-lifecycle-materialization-run.md
          git commit -m "chore(data): regenerate policy lifecycle outputs"
          git push origin HEAD:agent/policy-lifecycle-cleanup

      - name: Fail when materialization failed
        if: steps.regenerate.outputs.status != '0'
        run: exit 1
