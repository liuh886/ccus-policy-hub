name: Materialize policy DB consistency

on:
  push:
    branches:
      - agent/policy-db-consistency
    paths:
      - scripts/audit-policy-artifact-consistency.mjs
      - scripts/audit-policy-artifact-consistency.test.mjs
      - scripts/export-policy-markdown.mjs
      - package.json
      - .github/workflows/ci.yml
      - .github/workflows/deploy.yml
      - .github/workflows/materialize-policy-consistency.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-policy-projections:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout policy consistency branch
        uses: actions/checkout@v4
        with:
          ref: agent/policy-db-consistency
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize policy projections with diagnostics
        run: |
          set +e
          mkdir -p docs
          LOG=docs/policy-consistency-materialization.log
          : > "$LOG"

          run_step() {
            name="$1"
            shift
            echo "## $name" | tee -a "$LOG"
            "$@" >> "$LOG" 2>&1
            status=$?
            echo "exit_status=$status" | tee -a "$LOG"
            echo >> "$LOG"
            return 0
          }

          run_step "format controls" pnpm prettier --write \
            scripts/audit-policy-artifact-consistency.mjs \
            scripts/audit-policy-artifact-consistency.test.mjs \
            scripts/export-policy-markdown.mjs \
            package.json \
            .github/workflows/ci.yml \
            .github/workflows/deploy.yml \
            .github/workflows/materialize-policy-consistency.yml

          run_step "tests" pnpm test
          run_step "policy markdown export" pnpm manage:db:export:policies
          run_step "public data export" pnpm manage:db:data:export

          git restore \
            public/data/countries.json \
            public/data/facilities.json \
            public/data/manifest.json \
            public/data/quality.json

          run_step "format policy projections" pnpm prettier --write \
            "src/content/policies/**/*.md" \
            public/data/policies.json
          run_step "policy consistency audit" pnpm manage:db:audit:policy-consistency

          if [[ -f docs/policy-db-consistency-report.json ]]; then
            run_step "format consistency report" pnpm prettier --write \
              docs/policy-db-consistency-report.json \
              docs/policy-db-consistency-report.md
          fi

      - name: Commit diagnostics and available policy projections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/audit-policy-artifact-consistency.mjs \
            scripts/audit-policy-artifact-consistency.test.mjs \
            scripts/export-policy-markdown.mjs \
            package.json \
            .github/workflows/ci.yml \
            .github/workflows/deploy.yml \
            .github/workflows/materialize-policy-consistency.yml \
            src/content/policies \
            public/data/policies.json \
            docs/policy-consistency-materialization.log
          if [[ -f docs/policy-db-consistency-report.json ]]; then
            git add \
              docs/policy-db-consistency-report.json \
              docs/policy-db-consistency-report.md
          fi
          if git diff --cached --quiet; then
            echo "No policy consistency changes to commit."
          else
            git commit -m "chore(data): materialize policy consistency diagnostics"
            git push origin HEAD:agent/policy-db-consistency
          fi
