name: PR29 Type Diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'refactor/compare-governance-methodology'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture Astro diagnostics
        run: pnpm astro check > pr29-current-check.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pr29-current-check
          path: pr29-current-check.log
