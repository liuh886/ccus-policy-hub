name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Format Policy Gap Controls
        run: |
          pnpm prettier --write \
            docs/policy-gap-pass-2026-07.md \
            scripts/migrate-official-policy-gaps-2026-07.mjs \
            scripts/migrate-official-policy-gaps-2026-07.test.mjs \
            package.json

      - name: ESLint
        run: pnpm eslint .

      - name: Prettier Check
        run: pnpm prettier --check .

      - name: Test
        run: pnpm test

      - name: Astro Check
        run: pnpm astro check

      - name: Deep Audit (blocking)
        run: pnpm manage:db:audit:deep

      - name: Verify Committed Policy Projections
        run: |
          pnpm manage:db:audit:policy-consistency
          git diff --exit-code -- \
            src/content/policies \
            public/data/policies.json \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md

      - name: Generate Quality Metrics
        run: pnpm manage:db:quality:export

      - name: Generate Public Data
        run: pnpm manage:db:data:export

      - name: Format Generated Data
        run: pnpm prettier --write public/data/*.json

      - name: Verify Generated Public Policy Data
        run: pnpm manage:db:audit:policy-consistency

      - name: Build
        run: pnpm run build

      - name: Upload Formatted Policy Gap Controls
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formatted-policy-gap-controls
          path: |
            docs/policy-gap-pass-2026-07.md
            scripts/migrate-official-policy-gaps-2026-07.mjs
            scripts/migrate-official-policy-gaps-2026-07.test.mjs
            package.json
          if-no-files-found: error
          retention-days: 7
