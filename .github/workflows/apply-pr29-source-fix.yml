name: Apply PR29 Source Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'refactor/compare-governance-methodology'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/compare-governance-methodology
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply source fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/GovernanceComparisonWorkspace.astro')
          content = path.read_text(encoding='utf-8')
          content = content.replace("\ninterface Props {\n  lang?: 'zh' | 'en';\n}\n", "")
          content = content.replace(
              'const dictCountries: Record<string, string> = i18nDict.countries;',
              'const dictCountries = i18nDict.countries;'
          )
          path.write_text(content, encoding='utf-8')

          package_path = Path('package.json')
          package = package_path.read_text(encoding='utf-8')
          package = package.replace(
              "bash -o pipefail -c 'astro build 2>&1 | tail -120' && pagefind --site dist --output-path dist/pagefind",
              'astro build && pagefind --site dist --output-path dist/pagefind'
          )
          package_path.write_text(package, encoding='utf-8')
          PY
          pnpm exec prettier --write src/components/GovernanceComparisonWorkspace.astro package.json
          git diff --check
          git add src/components/GovernanceComparisonWorkspace.astro package.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -c core.hooksPath=/dev/null commit -m 'fix(compare): remove unsupported Astro frontmatter annotations'
          git push origin HEAD:refactor/compare-governance-methodology
