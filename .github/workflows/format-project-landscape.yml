name: Format project landscape implementation

on:
  push:
    branches:
      - feat/home-project-landscape

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/home-project-landscape
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Remove unused snapshot constant
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/ProjectLandscape.astro')
          text = path.read_text()
          text = text.replace('const snapshotYear = 2026;\n', '')
          path.write_text(text)
          PY
      - name: Format implementation
        run: |
          pnpm exec prettier --write \
            src/components/ProjectLandscape.astro \
            src/lib/projectLandscape.mjs \
            scripts/project-landscape.test.mjs \
            src/pages/index.astro \
            src/pages/en/index.astro
      - name: Commit formatted files
        run: |
          git rm .github/workflows/format-project-landscape.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git -c core.hooksPath=/dev/null commit -m 'style(home): format project landscape implementation'
          git push origin HEAD:feat/home-project-landscape
