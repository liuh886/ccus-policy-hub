name: Format final homepage QA

on:
  push:
    branches:
      - style/final-homepage-visual-qa

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: style/final-homepage-visual-qa
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format homepage QA files
        run: |
          pnpm exec prettier --write \
            src/pages/index.astro \
            src/pages/en/index.astro \
            src/styles/home-final-qa.css
      - name: Commit formatting and remove temporary workflow
        run: |
          git rm .github/workflows/format-final-homepage-qa.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git -c core.hooksPath=/dev/null commit -m 'style(home): format final visual QA'
          git push origin HEAD:style/final-homepage-visual-qa
