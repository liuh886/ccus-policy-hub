name: Apply PR29 Copy Extraction

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'refactor/compare-governance-methodology'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/compare-governance-methodology
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Extract frontmatter copy object
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/components/GovernanceComparisonWorkspace.astro')
          content = path.read_text(encoding='utf-8')
          import_line = "import { governanceComparisonCopy } from '../lib/governanceComparisonCopy.mjs';\n"
          marker = "import countryData from '../data/countries.json';\n"
          if import_line not in content:
              content = content.replace(marker, marker + import_line, 1)

          pattern = re.compile(r"\nconst text =\n[\s\S]*?\n---\n", re.M)
          replacement = "\nconst text = governanceComparisonCopy[lang];\n---\n"
          content, count = pattern.subn(replacement, content, count=1)
          if count != 1:
              raise SystemExit(f'Expected one copy block, replaced {count}')
          path.write_text(content, encoding='utf-8')
          PY
          pnpm exec prettier --write src/components/GovernanceComparisonWorkspace.astro src/lib/governanceComparisonCopy.mjs
          git add src/components/GovernanceComparisonWorkspace.astro src/lib/governanceComparisonCopy.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -c core.hooksPath=/dev/null commit -m 'fix(compare): move workspace copy outside Astro frontmatter'
          git push origin HEAD:refactor/compare-governance-methodology
