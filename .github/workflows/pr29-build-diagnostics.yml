name: PR29 Build Diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'refactor/compare-governance-methodology'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture build output
        run: pnpm build > pr29-build.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pr29-build-output
          path: pr29-build.log
