name: Verify PR29 Types

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'refactor/compare-governance-methodology'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Astro check
        run: pnpm astro check 2>&1 | tee pr29-check.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr29-check-output
          path: pr29-check.log
