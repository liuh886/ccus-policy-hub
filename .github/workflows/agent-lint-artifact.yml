name: Agent lint artifact

on:
  pull_request:
    branches: [main]

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture lint output
        run: pnpm lint > lint-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: agent-lint-output
          path: lint-output.txt
