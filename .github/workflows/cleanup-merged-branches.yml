name: Cleanup merged branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-merged-branches.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete branches from merged pull requests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const repository = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repository.data.default_branch;

            const openPulls = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', per_page: 100 }
            );

            const preservedBranches = new Set([defaultBranch]);
            for (const pull of openPulls) {
              if (pull.head.repo?.full_name === `${owner}/${repo}`) {
                preservedBranches.add(pull.head.ref);
              }
            }

            const closedPulls = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'closed', per_page: 100 }
            );

            const mergedBranches = new Set(
              closedPulls
                .filter(
                  (pull) =>
                    pull.merged_at &&
                    pull.head.repo?.full_name === `${owner}/${repo}`
                )
                .map((pull) => pull.head.ref)
            );

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            const deleted = [];
            const retained = [];
            const failed = [];

            for (const branch of branches) {
              const name = branch.name;

              if (preservedBranches.has(name)) {
                retained.push(`${name} (default or open PR)`);
                continue;
              }

              if (!mergedBranches.has(name)) {
                retained.push(`${name} (no merged PR match)`);
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${name}`,
                });
                deleted.push(name);
              } catch (error) {
                failed.push(`${name}: ${error.message}`);
              }
            }

            await core.summary
              .addHeading('Merged branch cleanup')
              .addRaw(`Deleted: ${deleted.length}\n\n`)
              .addList(deleted.length ? deleted : ['None'])
              .addRaw(`\nRetained: ${retained.length}\n\n`)
              .addList(retained.length ? retained : ['None'])
              .addRaw(`\nFailed: ${failed.length}\n\n`)
              .addList(failed.length ? failed : ['None'])
              .write();

            core.info(`Deleted branches: ${deleted.join(', ') || 'none'}`);
            core.info(`Retained branches: ${retained.join(', ') || 'none'}`);

            if (failed.length) {
              core.setFailed(`Failed to delete ${failed.length} branch(es): ${failed.join('; ')}`);
            }
