name: Materialize policy source audit

on:
  push:
    branches:
      - agent/policy-source-url-audit
    paths:
      - scripts/report-policy-source-gaps.mjs
      - scripts/report-policy-source-gaps.test.mjs
      - scripts/migrate-policy-source-metadata-2026-07.mjs
      - scripts/migrate-policy-source-metadata-2026-07.test.mjs
      - package.json
      - .github/workflows/materialize-policy-source-audit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-policy-sources:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/policy-source-url-audit
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format migration inputs
        run: |
          pnpm prettier --write \
            scripts/report-policy-source-gaps.mjs \
            scripts/report-policy-source-gaps.test.mjs \
            scripts/migrate-policy-source-metadata-2026-07.mjs \
            scripts/migrate-policy-source-metadata-2026-07.test.mjs \
            package.json \
            .github/workflows/materialize-policy-source-audit.yml

      - name: Persist formatted migration inputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/report-policy-source-gaps.mjs \
            scripts/report-policy-source-gaps.test.mjs \
            scripts/migrate-policy-source-metadata-2026-07.mjs \
            scripts/migrate-policy-source-metadata-2026-07.test.mjs \
            package.json \
            .github/workflows/materialize-policy-source-audit.yml
          if git diff --cached --quiet; then
            echo "Migration inputs already formatted."
          else
            git commit -m "style(data): format policy source migration"
            git push origin HEAD:agent/policy-source-url-audit
          fi

      - name: Validate migration tests
        run: pnpm test

      - name: Apply official-source migration
        run: pnpm manage:db:migrate:policy-sources

      - name: Audit and regenerate governed outputs
        run: |
          pnpm manage:db:audit:deep
          pnpm manage:db:export:md
          git restore src/content/facilities src/content/countries
          pnpm manage:db:quality:export
          pnpm manage:db:data:export
          pnpm manage:db:audit:policy-sources

      - name: Format governed outputs
        run: |
          pnpm prettier --write \
            "src/content/policies/**/*.md" \
            "public/data/*.json" \
            src/data/quality_metrics.generated.json \
            docs/policy-source-url-gaps.md \
            docs/policy-source-url-gaps.json

      - name: Commit governed source repairs
        run: |
          git add \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            src/content/policies \
            src/data/quality_metrics.generated.json \
            public/data \
            docs/policy-source-url-gaps.md \
            docs/policy-source-url-gaps.json
          if git diff --cached --quiet; then
            echo "No governed source repairs to commit."
          else
            git commit -m "fix(data): materialize official policy sources"
            git push origin HEAD:agent/policy-source-url-audit
          fi

      - name: Validate final repository state
        run: |
          pnpm lint
          pnpm test
          pnpm astro check
          pnpm build
