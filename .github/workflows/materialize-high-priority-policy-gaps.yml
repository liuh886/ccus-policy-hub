name: Materialize high-priority policy gaps

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: >-
      github.head_ref == 'agent/high-priority-policy-gaps' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/high-priority-policy-gaps
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format migration controls
        run: |
          pnpm prettier --write \
            scripts/migrate-high-priority-policy-gaps-2026-07.mjs \
            scripts/migrate-high-priority-policy-gaps-2026-07.test.mjs \
            agent/ccus-ai-agent/config/policy-coverage-framework.json \
            package.json

      - name: Validate migration logic
        run: |
          pnpm eslint .
          pnpm test

      - name: Apply DB-first migration
        run: pnpm manage:db:migrate:high-priority-policy-gaps

      - name: Regenerate policy-owned artifacts
        run: |
          pnpm manage:db:export:policies
          node agent/ccus-ai-agent/logic/manage.mjs db:audit:deep
          pnpm manage:db:quality:export
          pnpm manage:db:data:export
          git restore \
            public/data/facilities.json \
            public/data/dataset-versions.json
          pnpm prettier --write \
            "src/content/policies/**/*.md" \
            public/data/policies.json \
            public/data/countries.json \
            public/data/quality.json \
            public/data/manifest.json \
            src/data/quality_metrics.generated.json

      - name: Validate synchronized outputs
        run: |
          pnpm manage:db:audit:policy-consistency
          pnpm prettier --write \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md
          pnpm manage:db:audit:policy-coverage
          pnpm prettier --write \
            docs/policy-coverage-matrix.json \
            docs/policy-coverage-matrix.md
          rm -f docs/policy-coverage-matrix.json
          node scripts/sync-policy-link-projections.mjs
          pnpm test
          pnpm astro check
          pnpm run build

      - name: Enforce policy-only boundary
        run: |
          {
            git diff --name-only
            git ls-files --others --exclude-standard
          } | sort -u | tee policy-gap-materialization-diff.txt
          forbidden=0
          while IFS= read -r file; do
            case "$file" in
              package.json|agent/ccus-ai-agent/config/policy-coverage-framework.json|agent/ccus-ai-agent/db/ccus_master.sqlite|docs/policy-coverage-matrix.md|docs/policy-db-consistency-report.json|docs/policy-db-consistency-report.md|public/data/policies.json|public/data/countries.json|public/data/quality.json|public/data/manifest.json|src/data/quality_metrics.generated.json|scripts/migrate-high-priority-policy-gaps-2026-07.mjs|scripts/migrate-high-priority-policy-gaps-2026-07.test.mjs|src/content/policies/en/*.md|src/content/policies/zh/*.md|policy-gap-materialization-diff.txt)
                ;;
              *)
                echo "Forbidden non-policy change: $file"
                forbidden=1
                ;;
            esac
          done < policy-gap-materialization-diff.txt
          git diff --quiet -- src/content/facilities public/data/facilities.json || {
            echo 'Facility projections changed unexpectedly'
            forbidden=1
          }
          exit "$forbidden"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: high-priority-policy-gap-diagnostics
          path: |
            policy-gap-materialization-diff.txt
            docs/policy-coverage-matrix.md
            docs/policy-db-consistency-report.json
            docs/policy-db-consistency-report.md
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified migration
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            package.json \
            agent/ccus-ai-agent/config/policy-coverage-framework.json \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            docs/policy-coverage-matrix.md \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md \
            public/data/policies.json \
            public/data/countries.json \
            public/data/quality.json \
            public/data/manifest.json \
            src/data/quality_metrics.generated.json \
            scripts/migrate-high-priority-policy-gaps-2026-07.mjs \
            scripts/migrate-high-priority-policy-gaps-2026-07.test.mjs \
            src/content/policies
          if git diff --cached --quiet; then
            echo "No verified migration changes to commit."
            exit 0
          fi
          git commit -m "feat(data): materialize high-priority policy gaps"
          git push origin HEAD:agent/high-priority-policy-gaps
