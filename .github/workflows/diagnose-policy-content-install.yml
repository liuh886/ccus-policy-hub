name: Diagnose policy content install

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    if: github.head_ref == 'agent/policy-content-depth'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/policy-content-depth

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Capture install output
        id: install
        continue-on-error: true
        run: |
          set +e
          pnpm install --frozen-lockfile > install-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: policy-content-install-diagnostics
          path: install-output.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail when install failed
        if: steps.install.outputs.exit_code != '0'
        run: exit 1
