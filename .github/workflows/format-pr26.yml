name: Format PR26

on:
  push:
    branches:
      - fix/restore-range-appearance-controls

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-range-appearance-controls
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format changed files
        run: >-
          pnpm exec prettier --write
          src/components/CapacityTrend.astro
          src/lib/capacityMetrics.mjs
          scripts/capacity-metrics.test.mjs
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/CapacityTrend.astro src/lib/capacityMetrics.mjs scripts/capacity-metrics.test.mjs
          git commit -m "style(home): format capacity metric changes"
          git push origin HEAD:fix/restore-range-appearance-controls
