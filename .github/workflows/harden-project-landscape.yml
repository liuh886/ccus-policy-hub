name: Harden project landscape presentation

on:
  push:
    branches:
      - feat/home-project-landscape

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/home-project-landscape
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Fix scoped dark-mode selectors and dataset year copy
        run: |
          python - <<'PY'
          from pathlib import Path
          component = Path('src/components/ProjectLandscape.astro')
          text = component.read_text()
          text = text.replace('.dark .project-', ':global(.dark) .project-')
          component.write_text(text)
          for filename in ['src/pages/index.astro', 'src/pages/en/index.astro']:
              path = Path(filename)
              page = path.read_text().replace('IEA CCUS Projects Database 2025', 'IEA CCUS Projects Database 2026')
              path.write_text(page)
          PY
      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            src/components/ProjectLandscape.astro \
            src/pages/index.astro \
            src/pages/en/index.astro
      - name: Commit hardening
        run: |
          git rm .github/workflows/harden-project-landscape.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git -c core.hooksPath=/dev/null commit -m 'fix(home): harden project landscape themes and copy'
          git push origin HEAD:feat/home-project-landscape
