name: Format PR31

on:
  push:
    branches:
      - style/home-en-refinement

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: style/home-en-refinement
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            src/pages/en/index.astro \
            src/styles/home-en-refinement.css
      - name: Commit formatting
        run: |
          git rm .github/workflows/format-pr31.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git -c core.hooksPath=/dev/null commit -m 'style(home): format English homepage refinement'
          git push origin HEAD:style/home-en-refinement
