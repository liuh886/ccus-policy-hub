name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Format Policy Gap Controls
        run: |
          pnpm prettier --write \
            docs/policy-gap-pass-2026-07.md \
            scripts/migrate-official-policy-gaps-2026-07.mjs \
            scripts/migrate-official-policy-gaps-2026-07.test.mjs \
            package.json \
            .github/workflows/ci.yml

      - name: ESLint
        run: pnpm eslint .

      - name: Prettier Check
        run: pnpm prettier --check .

      - name: Test
        run: pnpm test

      - name: Astro Check
        run: pnpm astro check

      - name: Deep Audit (blocking)
        run: pnpm manage:db:audit:deep

      - name: Verify Committed Policy Projections
        run: |
          pnpm manage:db:audit:policy-consistency
          git diff --exit-code -- \
            src/content/policies \
            public/data/policies.json \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md

      - name: Generate Quality Metrics
        run: pnpm manage:db:quality:export

      - name: Generate Public Data
        run: pnpm manage:db:data:export

      - name: Format Generated Data
        run: pnpm prettier --write public/data/*.json

      - name: Verify Generated Public Policy Data
        run: pnpm manage:db:audit:policy-consistency

      - name: Build
        run: pnpm run build

      - name: Materialize Official Policy Gap Migration
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'policy/official-gap-pass-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: |
          pnpm manage:db:migrate:official-policy-gaps
          pnpm manage:db:export:policies
          pnpm manage:db:data:export
          git restore \
            public/data/countries.json \
            public/data/facilities.json \
            public/data/manifest.json \
            public/data/quality.json
          pnpm prettier --write \
            "src/content/policies/**/*.md" \
            public/data/policies.json
          pnpm manage:db:audit:policy-consistency
          pnpm prettier --write \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md
          pnpm manage:db:audit:deep
          pnpm test
          pnpm astro check
          pnpm run build

      - name: Enforce Policy-Only Change Boundary
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'policy/official-gap-pass-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: |
          forbidden=0
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml|package.json|agent/ccus-ai-agent/db/ccus_master.sqlite|docs/policy-gap-pass-2026-07.md|docs/policy-db-consistency-report.json|docs/policy-db-consistency-report.md|public/data/policies.json|scripts/migrate-official-policy-gaps-2026-07.mjs|scripts/migrate-official-policy-gaps-2026-07.test.mjs|src/content/policies/*)
                ;;
              *)
                echo "Forbidden non-policy change: $file"
                forbidden=1
                ;;
            esac
          done < <(git diff --name-only)
          exit "$forbidden"

      - name: Commit Verified Policy Migration
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'policy/official-gap-pass-2026-07' &&
          github.actor != 'github-actions[bot]'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'feat(data): materialize verified official policy gaps'
          branch: policy/official-gap-pass-2026-07
          file_pattern: >-
            .github/workflows/ci.yml
            package.json
            agent/ccus-ai-agent/db/ccus_master.sqlite
            docs/policy-gap-pass-2026-07.md
            docs/policy-db-consistency-report.json
            docs/policy-db-consistency-report.md
            public/data/policies.json
            scripts/migrate-official-policy-gaps-2026-07.mjs
            scripts/migrate-official-policy-gaps-2026-07.test.mjs
            src/content/policies
