name: Materialize policy coverage matrix

on:
  pull_request:
    branches: [main]

jobs:
  materialize:
    if: github.head_ref == 'agent/policy-coverage-audit-framework'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/policy-coverage-audit-framework

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format controls
        run: |
          pnpm prettier --write \
            agent/ccus-ai-agent/config/policy-coverage-framework.json \
            scripts/audit-policy-coverage.mjs \
            scripts/audit-policy-coverage.test.mjs \
            package.json

      - name: Validate and generate
        run: |
          pnpm eslint .
          pnpm test
          pnpm manage:db:audit:policy-coverage
          pnpm prettier --write \
            docs/policy-coverage-matrix.json \
            docs/policy-coverage-matrix.md
          pnpm manage:db:audit:policy-coverage
          git diff --exit-code -- \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            src/content/facilities \
            public/data/facilities.json

      - name: Upload verified matrix
        uses: actions/upload-artifact@v4
        with:
          name: policy-coverage-matrix
          path: |
            agent/ccus-ai-agent/config/policy-coverage-framework.json
            scripts/audit-policy-coverage.mjs
            scripts/audit-policy-coverage.test.mjs
            package.json
            docs/policy-coverage-matrix.json
            docs/policy-coverage-matrix.md
          if-no-files-found: error
          retention-days: 7
