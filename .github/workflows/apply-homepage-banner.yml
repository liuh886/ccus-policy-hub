name: Apply homepage banner summary

on:
  push:
    branches:
      - refactor/homepage-banner-capacity-summary

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/homepage-banner-capacity-summary
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Replace homepage hero blocks
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          updates = [
              (Path('src/pages/index.astro'), "import Layout from '../layouts/Layout.astro';", "import HomepageHero from '../components/HomepageHero.astro';", 'zh'),
              (Path('src/pages/en/index.astro'), "import Layout from '../../layouts/Layout.astro';", "import HomepageHero from '../../components/HomepageHero.astro';", 'en'),
          ]

          for path, layout_import, hero_import, lang in updates:
              content = path.read_text(encoding='utf-8')
              if hero_import not in content:
                  content = content.replace(layout_import, f"{layout_import}\n{hero_import}", 1)

              pattern = re.compile(
                  r"\n\s*<!-- Hero Section -->\s*\n\s*<header\b.*?</header>\s*\n",
                  re.DOTALL,
              )
              replacement = f'\n    <HomepageHero lang="{lang}" />\n\n'
              content, count = pattern.subn(replacement, content, count=1)
              if count != 1:
                  raise RuntimeError(f'Expected one hero block in {path}, replaced {count}')
              path.write_text(content, encoding='utf-8')
          PY
      - name: Format and validate
        run: |
          pnpm exec prettier --write src/components/HomepageHero.astro src/pages/index.astro src/pages/en/index.astro
          pnpm lint
          pnpm test
          pnpm astro check
          pnpm run build
      - name: Commit implementation and remove temporary workflow
        run: |
          git rm .github/workflows/apply-homepage-banner.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/HomepageHero.astro src/pages/index.astro src/pages/en/index.astro
          git commit -m "refactor(home): move capacity metrics into banner"
          git push origin HEAD:refactor/homepage-banner-capacity-summary
