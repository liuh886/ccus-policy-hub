name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Format policy coverage controls
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: |
          pnpm prettier --write \
            scripts/migrate-policy-coverage-corrections-2026-07.mjs \
            scripts/migrate-policy-coverage-corrections-2026-07.test.mjs \
            package.json \
            .github/workflows/ci.yml

      - name: ESLint
        run: pnpm eslint .

      - name: Prettier Check
        run: pnpm prettier --check .

      - name: Test
        run: pnpm test

      - name: Apply policy coverage migration
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: pnpm manage:db:migrate:policy-coverage-corrections

      - name: Audit migrated database
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: pnpm manage:db:audit:deep

      - name: Export migrated policy projections
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: |
          pnpm manage:db:export:policies
          rm -f \
            src/content/policies/en/kr-motie-cluster-district-2025.md \
            src/content/policies/zh/kr-motie-cluster-district-2025.md \
            src/content/policies/en/ph-ccus-policy-framework-2025.md \
            src/content/policies/zh/ph-ccus-policy-framework-2025.md

      - name: Synchronize migrated policy relationships
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: node scripts/sync-policy-link-projections.mjs --write

      - name: Regenerate migrated public data
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: |
          pnpm manage:db:quality:export
          pnpm manage:db:data:export
          mapfile -t candidates < <(
            git diff --name-only -- \
              src/content/policies \
              src/content/facilities \
              public/data \
              src/data/quality_metrics.generated.json \
              docs/policy-db-consistency-report.json \
              docs/policy-db-consistency-report.md
          )
          changed=()
          for file in "${candidates[@]}"; do
            if [[ -f "$file" ]]; then
              changed+=("$file")
            fi
          done
          if (( ${#changed[@]} > 0 )); then
            pnpm prettier --write "${changed[@]}"
          fi

      - name: Astro Check
        run: pnpm astro check

      - name: Deep Audit (blocking)
        run: pnpm manage:db:audit:deep

      - name: Verify Committed Policy Projections
        run: |
          pnpm manage:db:audit:policy-consistency
          if [[ "${GITHUB_ACTOR}" == "github-actions[bot]" || "${GITHUB_HEAD_REF}" != "agent/policy-coverage-corrections-2026-07" ]]; then
            git diff --exit-code -- \
              src/content/policies \
              public/data/policies.json \
              docs/policy-db-consistency-report.json \
              docs/policy-db-consistency-report.md
          fi

      - name: Verify Committed Policy Links
        run: node scripts/sync-policy-link-projections.mjs

      - name: Generate Quality Metrics
        run: pnpm manage:db:quality:export

      - name: Generate Public Data
        run: pnpm manage:db:data:export

      - name: Format Generated Data
        run: pnpm prettier --write public/data/*.json

      - name: Verify Generated Public Policy Data
        run: pnpm manage:db:audit:policy-consistency

      - name: Verify Generated Policy Links
        run: node scripts/sync-policy-link-projections.mjs

      - name: Build
        run: pnpm run build

      - name: Enforce policy-only boundary
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: |
          forbidden=0
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml|.github/workflows/materialize-policy-coverage-corrections.yml|package.json|scripts/migrate-policy-coverage-corrections-2026-07.mjs|scripts/migrate-policy-coverage-corrections-2026-07.test.mjs|agent/ccus-ai-agent/db/ccus_master.sqlite|src/content/policies/en/*.md|src/content/policies/zh/*.md|src/content/facilities/en/*.md|src/content/facilities/zh/*.md|public/data/*.json|src/data/quality_metrics.generated.json|docs/policy-db-consistency-report.json|docs/policy-db-consistency-report.md)
                ;;
              *)
                echo "Forbidden non-policy change: $file"
                forbidden=1
                ;;
            esac
          done < <(git diff --name-only)
          git diff --quiet -- \
            src/content/countries \
            agent/ccus-ai-agent/governance || forbidden=1
          exit "$forbidden"

      - name: Commit materialized policy corrections
        if: >-
          success() &&
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/policy-coverage-corrections-2026-07' &&
          github.actor != 'github-actions[bot]'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            src/content/policies \
            src/content/facilities \
            public/data \
            src/data/quality_metrics.generated.json \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md
          if git diff --cached --quiet; then
            echo 'No materialized policy changes to commit.'
          else
            git commit -m 'fix(data): materialize verified policy coverage corrections'
            git push origin HEAD:agent/policy-coverage-corrections-2026-07
          fi
