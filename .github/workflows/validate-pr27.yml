name: Validate PR27

on:
  push:
    branches:
      - refactor/light-first-editorial-ui

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/light-first-editorial-ui
          fetch-depth: 0
      - name: Merge current PR26 base
        run: |
          git fetch origin fix/restore-range-appearance-controls
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/fix/restore-range-appearance-controls
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format PR27 files
        run: >-
          pnpm exec prettier --write
          src/components/ThemeToggle.astro
          src/layouts/Layout.astro
          src/styles/light-editorial.css
          src/styles/light-editorial-capacity.css
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Astro Check
        run: pnpm astro check
      - name: Deep Audit
        run: pnpm manage:db:audit:deep
      - name: Generate Quality Metrics
        run: pnpm manage:db:quality:export
      - name: Generate Public Data
        run: pnpm manage:db:data:export
      - name: Format Generated Data
        run: pnpm prettier --write public/data/*.json
      - name: Build
        run: pnpm run build
      - name: Push merged base and formatting
        run: |
          git add src/components/ThemeToggle.astro src/layouts/Layout.astro src/styles/light-editorial.css src/styles/light-editorial-capacity.css
          if ! git diff --cached --quiet; then
            git commit -m "style(ui): format light editorial refinements"
          fi
          git push origin HEAD:refactor/light-first-editorial-ui
