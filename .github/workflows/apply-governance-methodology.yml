name: Apply governance methodology refactor

on:
  push:
    branches:
      - refactor/compare-governance-methodology

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/compare-governance-methodology
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply methodology migration
        run: node scripts/apply-governance-methodology.mjs
      - name: Migrate SQLite fields
        run: node -e "import('./agent/ccus-ai-agent/logic/governance-deployment-algo.mjs').then(m => m.computeGovernanceDeployment())"
      - name: Format and validate
        run: |
          pnpm exec prettier --write \
            src/lib/governanceBenchmarking.mjs \
            src/lib/governanceComparisonClient.mjs \
            scripts/governance-benchmarking.test.mjs \
            src/pages/compare/index.astro \
            src/pages/en/compare/index.astro \
            src/content/config.ts \
            agent/ccus-ai-agent/logic/manage.mjs \
            agent/ccus-ai-agent/logic/governance-deployment-algo.mjs \
            agent/ccus-ai-agent/logic/maturity-algo.mjs \
            agent/ccus-ai-agent/logic/fix-export-maturity.mjs \
            agent/ccus-ai-agent/db/schema.sql \
            public/data/schemas/country.schema.json \
            package.json
          pnpm lint
          pnpm test
          pnpm astro check
          pnpm manage:db:audit:deep
          pnpm build
      - name: Commit implementation
        run: |
          git rm .github/workflows/apply-governance-methodology.yml
          git rm scripts/apply-governance-methodology.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(compare): clarify governance and deployment methodology"
          git push origin HEAD:refactor/compare-governance-methodology
