name: Apply PR29 JSDoc Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'refactor/compare-governance-methodology'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/compare-governance-methodology
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Infer canonical country input as string
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/GovernanceComparisonWorkspace.astro')
          content = path.read_text(encoding='utf-8')
          content = content.replace('/** @param {string} value */\n', '')
          old = "const canonicalCountry = (value) => countryAliases.get(value) || value;"
          new = "const canonicalCountry = (value = '') => countryAliases.get(value) || value;"
          if old not in content:
              raise SystemExit('canonicalCountry line not found')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
          pnpm exec prettier --write src/components/GovernanceComparisonWorkspace.astro
          git add src/components/GovernanceComparisonWorkspace.astro
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -c core.hooksPath=/dev/null commit -m 'fix(compare): infer canonical country input type'
          git push origin HEAD:refactor/compare-governance-methodology
