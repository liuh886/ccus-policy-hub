name: Cleanup stale Build Week branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-stale-build-week-branches.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete closed stale branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const targets = [
              { ref: 'feat/build-week-trust-baseline', pr: 23 },
              { ref: 'feat/project-readiness-agent', pr: 24 },
            ];

            for (const target of targets) {
              const { data: pull } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: target.pr,
              });

              if (pull.state !== 'closed') {
                throw new Error(`PR #${target.pr} is not closed; refusing to delete ${target.ref}`);
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${target.ref}`,
                });
                core.info(`Deleted ${target.ref}`);
              } catch (error) {
                if (error.status === 404 || error.status === 422) {
                  core.info(`${target.ref} is already absent`);
                  continue;
                }
                throw error;
              }
            }
