name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Astro Check
        run: pnpm astro check

      - name: Deep Audit (blocking)
        run: pnpm manage:db:audit:deep

      - name: Generate Quality Metrics
        run: pnpm manage:db:quality:export

      - name: Generate Public Data
        run: pnpm manage:db:data:export

      - name: Build
        run: pnpm run build
