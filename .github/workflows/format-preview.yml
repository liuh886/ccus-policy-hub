name: Format Preview

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format changed UI files
        run: >-
          pnpm exec prettier --write
          src/components/ThemeToggle.astro
          src/layouts/Layout.astro
          src/styles/interaction-controls.css
          src/styles/light-editorial.css
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ThemeToggle.astro src/layouts/Layout.astro src/styles/interaction-controls.css src/styles/light-editorial.css
          if git diff --cached --quiet; then
            echo "No formatting changes"
          else
            git commit -m "style(ui): format editorial design files"
            git push origin HEAD:${{ github.head_ref }}
          fi
