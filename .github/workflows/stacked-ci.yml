name: Stacked CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm astro check
      - run: pnpm manage:db:audit:deep
      - run: pnpm manage:db:quality:export
      - run: pnpm manage:db:data:export
      - run: pnpm prettier --write public/data/*.json
      - run: pnpm run build
