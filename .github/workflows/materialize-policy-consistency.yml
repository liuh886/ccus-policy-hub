name: Materialize policy DB consistency

on:
  push:
    branches:
      - agent/policy-db-consistency
    paths:
      - scripts/audit-policy-artifact-consistency.mjs
      - scripts/audit-policy-artifact-consistency.test.mjs
      - scripts/export-policy-markdown.mjs
      - package.json
      - .github/workflows/ci.yml
      - .github/workflows/deploy.yml
      - .github/workflows/materialize-policy-consistency.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-policy-projections:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout policy consistency branch
        uses: actions/checkout@v4
        with:
          ref: agent/policy-db-consistency
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format policy consistency inputs
        run: |
          pnpm prettier --write \
            scripts/audit-policy-artifact-consistency.mjs \
            scripts/audit-policy-artifact-consistency.test.mjs \
            scripts/export-policy-markdown.mjs \
            package.json \
            .github/workflows/ci.yml \
            .github/workflows/deploy.yml \
            .github/workflows/materialize-policy-consistency.yml

      - name: Persist exporter and audit inputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/audit-policy-artifact-consistency.mjs \
            scripts/audit-policy-artifact-consistency.test.mjs \
            scripts/export-policy-markdown.mjs \
            package.json \
            .github/workflows/ci.yml \
            .github/workflows/deploy.yml \
            .github/workflows/materialize-policy-consistency.yml
          if git diff --cached --quiet; then
            echo "Policy exporter and audit inputs already formatted."
          else
            git commit -m "style(data): format policy projection controls"
            git push origin HEAD:agent/policy-db-consistency
          fi

      - name: Validate policy projection tests
        run: pnpm test

      - name: Export policy Markdown from SQLite only
        run: pnpm manage:db:export:policies

      - name: Regenerate public policy projection
        run: |
          pnpm manage:db:data:export
          git restore \
            public/data/countries.json \
            public/data/facilities.json \
            public/data/manifest.json \
            public/data/quality.json

      - name: Format policy projections
        run: |
          pnpm prettier --write \
            "src/content/policies/**/*.md" \
            public/data/policies.json

      - name: Run policy DB consistency audit
        run: pnpm manage:db:audit:policy-consistency

      - name: Format consistency report
        run: |
          pnpm prettier --write \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md

      - name: Commit governed policy projections
        run: |
          git add \
            src/content/policies \
            public/data/policies.json \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md
          if git diff --cached --quiet; then
            echo "No policy projection changes to commit."
          else
            git commit -m "fix(data): materialize DB-faithful policy projections"
            git push origin HEAD:agent/policy-db-consistency
          fi

      - name: Validate final repository state
        run: |
          pnpm lint
          pnpm test
          pnpm astro check
          pnpm manage:db:audit:policy-consistency
          pnpm build
