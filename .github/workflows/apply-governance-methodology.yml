name: Apply governance methodology refactor

on:
  push:
    branches:
      - refactor/compare-governance-methodology

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/compare-governance-methodology
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply page, schema and database-contract changes
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          repo = Path('.')

          def replace_once(text, old, new, path):
              if old not in text:
                  raise RuntimeError(f'Missing expected text in {path}: {old[:80]}')
              return text.replace(old, new, 1)

          page_specs = [
              {
                  'path': Path('src/pages/compare/index.astro'),
                  'lang': 'zh',
                  'heading_old': 'Governance Benchmarking',
                  'heading_new': 'Governance Capability Profile',
                  'title_old': '国家治理体系对标',
                  'title_new': '治理能力画像',
                  'subtitle_old': 'Multi-Country Aggregate Analysis (Peak Strength)',
                  'subtitle_new': 'Peak Policy Strength · 所选国家现行政策体系',
                  'matrix_old': '全球治理成熟度矩阵 Maturity Matrix',
                  'matrix_new': '治理—部署矩阵 Governance–Deployment Matrix',
                  'quadrants': {
                      'Top-Left: Policy First': '左上：制度先行 Policy-led',
                      'Top-Right: Leaders': '右上：协同领先 Integrated leaders',
                      'Bot-Left: Early Stage': '左下：基础培育 Foundation building',
                      'Bot-Right: Project Led': '右下：工程先行 Deployment-led',
                  },
                  'scope': '''
            <div class="mb-7 flex flex-wrap items-center justify-between gap-3 rounded-xl border border-slate-200 bg-white/70 px-4 py-3 dark:border-slate-800 dark:bg-slate-950/30">
              <div>
                <div class="text-[10px] font-black uppercase tracking-widest text-slate-500">分析范围</div>
                <div class="mt-1 text-xs text-slate-500">默认比较所选政策所属国家的全部现行政策体系。</div>
              </div>
              <select id="analysis-scope" class="min-w-44 rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-bold text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200">
                <option value="system">国家现行政策体系</option>
                <option value="selected">仅所选政策</option>
              </select>
            </div>
''',
                  'benchmark': '''
            <p class="mt-4 text-[10px] leading-relaxed text-slate-500 dark:text-slate-400">
              全球基准：治理能力指数中位数 <strong data-governance-benchmark>—</strong>；有已承诺项目国家的项目记录规模中位数 <strong data-deployment-benchmark>—</strong>。治理指数为五个峰值维度的平均值。
            </p>
''',
                  'script': '''<script>
  import { initGovernanceComparison } from '../../lib/governanceComparisonClient.mjs';

  function initComparePage() {
    initGovernanceComparison('zh');
  }

  document.addEventListener('astro:page-load', initComparePage);
  if (document.readyState === 'complete') initComparePage();
  else window.addEventListener('load', initComparePage, { once: true });
</script>''',
              },
              {
                  'path': Path('src/pages/en/compare/index.astro'),
                  'lang': 'en',
                  'heading_old': 'Governance Benchmarking',
                  'heading_new': 'Governance Capability Profile',
                  'title_old': 'System Peak Strength',
                  'title_new': 'Governance Capability Profile',
                  'subtitle_old': 'Multi-Country Aggregate Analysis (Peak Capability)',
                  'subtitle_new': 'Peak Policy Strength · Active national policy systems',
                  'matrix_old': 'Global Governance Maturity Matrix',
                  'matrix_new': 'Governance–Deployment Matrix',
                  'quadrants': {
                      'Top-Left: Policy First': 'Top-left: Policy-led',
                      'Top-Right: Leaders': 'Top-right: Integrated leaders',
                      'Bottom-Left: Early Stage': 'Bottom-left: Foundation building',
                      'Bottom-Right: Project Led': 'Bottom-right: Deployment-led',
                  },
                  'scope': '''
            <div class="mb-7 flex flex-wrap items-center justify-between gap-3 rounded-xl border border-slate-200 bg-white/70 px-4 py-3 dark:border-slate-800 dark:bg-slate-950/30">
              <div>
                <div class="text-[10px] font-black uppercase tracking-widest text-slate-500">Analysis scope</div>
                <div class="mt-1 text-xs text-slate-500">The default view benchmarks the active national policy system behind the selected policies.</div>
              </div>
              <select id="analysis-scope" class="min-w-44 rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-bold text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200">
                <option value="system">Active national policy system</option>
                <option value="selected">Selected policies only</option>
              </select>
            </div>
''',
                  'benchmark': '''
            <p class="mt-4 text-[10px] leading-relaxed text-slate-500 dark:text-slate-400">
              Global benchmark: median governance capability <strong data-governance-benchmark>—</strong>; median committed project-record scale among countries with committed projects <strong data-deployment-benchmark>—</strong>. The governance index is the mean of five peak dimensions.
            </p>
''',
                  'script': '''<script>
  import { initGovernanceComparison } from '../../../lib/governanceComparisonClient.mjs';

  function initComparePage() {
    initGovernanceComparison('en');
  }

  document.addEventListener('astro:page-load', initComparePage);
  if (document.readyState === 'complete') initComparePage();
  else window.addEventListener('load', initComparePage, { once: true });
</script>''',
              },
          ]

          for spec in page_specs:
              path = spec['path']
              content = path.read_text(encoding='utf-8')
              content = replace_once(content, spec['heading_old'], spec['heading_new'], path)
              content = replace_once(content, spec['title_old'], spec['title_new'], path)
              content = replace_once(content, spec['subtitle_old'], spec['subtitle_new'], path)
              content = replace_once(content, spec['matrix_old'], spec['matrix_new'], path)
              for old, new in spec['quadrants'].items():
                  content = replace_once(content, old, new, path)

              marker = '          <div class="h-80 w-full mb-8">'
              content = replace_once(content, marker, spec['scope'] + '\n' + marker, path)
              quadrant_end = '''            </div>
          </div>

          <!-- Facility Stats Comparison -->'''
              content = replace_once(
                  content,
                  quadrant_end,
                  '''            </div>\n''' + spec['benchmark'] + '''          </div>\n\n          <!-- Facility Stats Comparison -->''',
                  path,
              )
              content, count = re.subn(r'<script>.*?</script>\s*$', spec['script'] + '\n', content, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'Expected one terminal script in {path}, replaced {count}')
              path.write_text(content, encoding='utf-8')

          schema_path = Path('agent/ccus-ai-agent/db/schema.sql')
          schema = schema_path.read_text(encoding='utf-8')
          schema = replace_once(
              schema,
              '  storage_2050 TEXT,\n',
              '''  storage_2050 TEXT,
  deployment_capacity_mtpa REAL NOT NULL DEFAULT 0,
  governance_capability_index REAL NOT NULL DEFAULT 0,
''',
              schema_path,
          )
          schema_path.write_text(schema, encoding='utf-8')

          manage_path = Path('agent/ccus-ai-agent/logic/manage.mjs')
          manage = manage_path.read_text(encoding='utf-8')
          manage = replace_once(
              manage,
              '''      case 'db:compute:maturity':
        await dbComputeMaturity(SQL);
        break;
''',
              '''      case 'db:compute:governance-deployment':
        await dbComputeGovernanceDeployment(SQL);
        break;
      case 'db:compute:maturity':
        console.warn('db:compute:maturity is deprecated; use db:compute:governance-deployment.');
        await dbComputeGovernanceDeployment(SQL);
        break;
''',
              manage_path,
          )
          manage = replace_once(
              manage,
              '''        maturity: {
          x: c.maturity_x || 0,
          y: c.maturity_y || 0,
        },
''',
              '''        governanceDeployment: {
          deploymentCapacityMtpa:
            c.deployment_capacity_mtpa || c.maturity_x || 0,
          governanceCapabilityIndex:
            c.governance_capability_index || (c.maturity_y || 0) / 5,
        },
''',
              manage_path,
          )
          manage = replace_once(
              manage,
              '''async function dbComputeMaturity(SQL) {
  const { execSync } = await import('child_process');
  execSync('node agent/ccus-ai-agent/logic/maturity-algo.mjs', {
    stdio: 'inherit',
  });
}
''',
              '''async function dbComputeGovernanceDeployment(SQL) {
  void SQL;
  const { computeGovernanceDeployment } = await import(
    './governance-deployment-algo.mjs'
  );
  await computeGovernanceDeployment();
}
''',
              manage_path,
          )
          manage = replace_once(
              manage,
              "  await run('db:compute:maturity', () => dbComputeMaturity(SQL));",
              "  await run('db:compute:governance-deployment', () =>\n    dbComputeGovernanceDeployment(SQL)\n  );",
              manage_path,
          )
          manage_path.write_text(manage, encoding='utf-8')

          Path('agent/ccus-ai-agent/logic/maturity-algo.mjs').write_text(
              """import { computeGovernanceDeployment } from './governance-deployment-algo.mjs';\n\nconsole.warn('maturity-algo.mjs is deprecated; computing explicit governance–deployment metrics.');\ncomputeGovernanceDeployment().catch((error) => {\n  console.error(error);\n  process.exitCode = 1;\n});\n""",
              encoding='utf-8',
          )
          Path('agent/ccus-ai-agent/logic/fix-export-maturity.mjs').write_text(
              """import fs from 'fs';\n\nconst path = 'agent/ccus-ai-agent/logic/manage.mjs';\nconst content = fs.readFileSync(path, 'utf8');\nif (!content.includes('governanceDeployment: {')) {\n  throw new Error('manage.mjs is missing the governanceDeployment export contract.');\n}\nconsole.warn('fix-export-maturity.mjs is deprecated; governanceDeployment is already explicit.');\n""",
              encoding='utf-8',
          )

          config_path = Path('src/content/config.ts')
          config = config_path.read_text(encoding='utf-8')
          config = replace_once(
              config,
              '  provenance: provenanceSchema.optional(),\n});\n\nconst countries_zh',
              '''  governanceDeployment: z
    .object({
      deploymentCapacityMtpa: z.number().min(0).default(0),
      governanceCapabilityIndex: z.number().min(0).max(100).default(0),
    })
    .optional(),
  maturity: z
    .object({
      x: z.number().min(0).default(0),
      y: z.number().min(0).max(500).default(0),
    })
    .optional(),
  provenance: provenanceSchema.optional(),
});

const countries_zh''',
              config_path,
          )
          config_path.write_text(config, encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          scripts = package['scripts']
          scripts['manage:db:compute:governance-deployment'] = (
              'node agent/ccus-ai-agent/logic/manage.mjs db:compute:governance-deployment'
          )
          scripts['manage:db:compute:maturity'] = (
              'node agent/ccus-ai-agent/logic/manage.mjs db:compute:maturity'
          )
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          public_schema_path = Path('public/data/schemas/country.schema.json')
          public_schema = json.loads(public_schema_path.read_text(encoding='utf-8'))
          public_schema['properties']['deployment_capacity_mtpa'] = {
              'type': 'number',
              'minimum': 0,
              'description': 'Committed project-record capacity for operational and under-construction facilities (Mtpa)',
          }
          public_schema['properties']['governance_capability_index'] = {
              'type': 'number',
              'minimum': 0,
              'maximum': 100,
              'description': 'Mean of the five peak governance-dimension scores',
          }
          public_schema_path.write_text(
              json.dumps(public_schema, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Migrate and recompute SQLite governance-deployment fields
        run: node -e "import('./agent/ccus-ai-agent/logic/governance-deployment-algo.mjs').then(m => m.computeGovernanceDeployment())"
      - name: Format and validate
        run: |
          pnpm exec prettier --write \
            src/lib/governanceBenchmarking.mjs \
            src/lib/governanceComparisonClient.mjs \
            scripts/governance-benchmarking.test.mjs \
            src/pages/compare/index.astro \
            src/pages/en/compare/index.astro \
            src/content/config.ts \
            agent/ccus-ai-agent/logic/manage.mjs \
            agent/ccus-ai-agent/logic/governance-deployment-algo.mjs \
            agent/ccus-ai-agent/logic/maturity-algo.mjs \
            agent/ccus-ai-agent/logic/fix-export-maturity.mjs \
            agent/ccus-ai-agent/db/schema.sql \
            public/data/schemas/country.schema.json \
            package.json
          pnpm lint
          pnpm test
          pnpm astro check
          pnpm manage:db:audit:deep
          pnpm build
      - name: Commit implementation and remove temporary workflow
        run: |
          git rm .github/workflows/apply-governance-methodology.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/governanceBenchmarking.mjs \
            src/lib/governanceComparisonClient.mjs \
            scripts/governance-benchmarking.test.mjs \
            src/pages/compare/index.astro \
            src/pages/en/compare/index.astro \
            src/content/config.ts \
            agent/ccus-ai-agent/db/schema.sql \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            agent/ccus-ai-agent/logic/manage.mjs \
            agent/ccus-ai-agent/logic/governance-deployment-algo.mjs \
            agent/ccus-ai-agent/logic/maturity-algo.mjs \
            agent/ccus-ai-agent/logic/fix-export-maturity.mjs \
            public/data/schemas/country.schema.json \
            package.json
          git commit -m "refactor(compare): clarify governance and deployment methodology"
          git push origin HEAD:refactor/compare-governance-methodology
