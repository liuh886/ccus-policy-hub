name: Update README branding

on:
  push:
    branches:
      - docs/readme-2026-refresh

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/readme-2026-refresh
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Update logo and Ko-fi footer
        run: |
          python - <<'PY'
          from pathlib import Path

          updates = {
              "README.md": (
                  'https://raw.githubusercontent.com/liuh886/ccus-policy-hub/main/public/favicon.svg',
                  'https://raw.githubusercontent.com/liuh886/ccus-policy-hub/main/public/logo_optimized.svg',
                  '  <sub>Built for the global climate and CCUS research community by <b>liuh886</b></sub>',
                  '  <p><a href="https://ko-fi.com/F1F7WYJ6B">☕ Support CCUS Policy Hub on Ko-fi</a></p>\n  <sub>Built for the global climate and CCUS research community by <b>liuh886</b></sub>',
              ),
              "README.zh.md": (
                  'https://raw.githubusercontent.com/liuh886/ccus-policy-hub/main/public/favicon.svg',
                  'https://raw.githubusercontent.com/liuh886/ccus-policy-hub/main/public/logo_optimized.svg',
                  '  <sub>由 <b>liuh886</b> 为全球气候与 CCUS 研究社区构建</sub>',
                  '  <p><a href="https://ko-fi.com/F1F7WYJ6B">☕ 在 Ko-fi 支持 CCUS Policy Hub</a></p>\n  <sub>由 <b>liuh886</b> 为全球气候与 CCUS 研究社区构建</sub>',
              ),
          }

          for filename, (old_logo, new_logo, old_footer, new_footer) in updates.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              text = text.replace(old_logo, new_logo)
              if 'https://ko-fi.com/F1F7WYJ6B' not in text:
                  text = text.replace(old_footer, new_footer)
              path.write_text(text, encoding="utf-8")
          PY
      - run: pnpm exec prettier --write README.md README.zh.md
      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh.md
          git commit -m "docs: finalize README branding and support link"
          git push
