name: Productize CCUS agent workspace

on:
  push:
    branches:
      - refactor/productize-ccus-agent-workspace

permissions:
  contents: write

jobs:
  productize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/productize-ccus-agent-workspace
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Productize agent workspace
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import textwrap

          root = Path('.')
          agent = root / 'agent' / 'ccus-ai-agent'

          def write(path, content):
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(textwrap.dedent(content).lstrip(), encoding='utf-8')

          write(root / 'agent.md', r'''
          # CCUS Policy Hub | Agent Entry

          `agent/ccus-ai-agent/` is a productized maintenance workspace for CCUS Policy Hub. A general-purpose model should be able to read it, understand the domain and repository rules, and maintain the website through evidence-backed, reviewable changes.

          ## Start here

          1. Read [`agent/ccus-ai-agent/AGENTS.md`](./agent/ccus-ai-agent/AGENTS.md).
          2. Read [`agent/ccus-ai-agent/SAFETY.md`](./agent/ccus-ai-agent/SAFETY.md).
          3. Select the task-specific guide:
             - domain and evidence rules: [`SKILL.md`](./agent/ccus-ai-agent/SKILL.md)
             - data and software structure: [`ARCHITECTURE.md`](./agent/ccus-ai-agent/ARCHITECTURE.md)
             - analytical definitions: [`METHODOLOGY.md`](./agent/ccus-ai-agent/METHODOLOGY.md)
             - commands and release workflow: [`RUNBOOK.md`](./agent/ccus-ai-agent/RUNBOOK.md)

          ## Authority boundaries

          - External official sources establish real-world facts.
          - `agent/ccus-ai-agent/db/ccus_master.sqlite` is the authoritative structured maintenance source for policies, facilities, country profiles, relationships, and provenance stored by this repository.
          - `src/content/`, `public/data/`, and quality outputs are generated publication artifacts and must not be treated as independent data sources.
          - Frontend, documentation, tests, and build configuration are maintained in their normal repository locations.

          ## Current work

          Use current GitHub issues, pull requests, the latest CI run, dataset-version metadata, and quality reports to determine project state. Historical task notes inside the repository are not an active task queue.
          ''')

          write(agent / 'AGENTS.md', r'''
          # CCUS Policy Hub Maintenance Agent

          This directory defines a reusable CCUS maintenance agent for CCUS Policy Hub. Its purpose is not merely to store scripts: it gives a general-purpose model enough domain, methodological, engineering, and safety context to maintain the product through reviewable GitHub changes.

          ## 1. Read order

          Read these files before editing the repository:

          1. `AGENTS.md` — operating contract and task routing.
          2. `SAFETY.md` — approval boundaries and prohibited operations.
          3. `SKILL.md` — CCUS domain and evidence standards.
          4. One or more task-specific references:
             - `ARCHITECTURE.md` for data flow, repository structure, or schema work;
             - `METHODOLOGY.md` for metrics, scoring, charts, or analytical copy;
             - `RUNBOOK.md` for commands, validation, publishing, and recovery.

          `DESIGN.md` is retained as a compatibility index for older links. It is not a second source of rules.

          ## 2. Task classification

          | Task | Primary files | Typical risk |
          | --- | --- | --- |
          | Policy or regulatory update | SQLite, provenance, policy analysis | Medium |
          | Facility refresh or correction | SQLite, facility import pipeline | Medium to high |
          | Governance scoring or methodology | Algorithm, tests, methodology docs | High |
          | Homepage, Compare, facility UI | `src/`, tests, visual QA | Low to medium |
          | Documentation or AI-readable interface | Markdown, public-data generators | Low to medium |
          | Schema, reverse sync, bulk overwrite | Database schema or migration tooling | High |

          ## 3. Authority hierarchy

          1. **External evidence:** official legislation, regulators, government publications, project owners, authoritative datasets, and clearly cited primary sources establish factual claims.
          2. **Structured repository data:** `db/ccus_master.sqlite` is the authoritative maintenance source for structured records already accepted by this project.
          3. **Generated artifacts:** `src/content/`, `public/data/`, quality JSON, and search indexes are publication outputs.
          4. **Presentation:** Astro components and documentation explain the data but do not redefine it.

          SQLite is not infallible. When reliable evidence conflicts with the database, document the conflict, correct the structured record through the governed workflow, and preserve provenance.

          ## 4. Non-negotiable rules

          - Do not invent policy clauses, project dates, capacities, coordinates, legal applicability, or citations.
          - Do not hand-edit generated Markdown or public JSON as the source of a data correction.
          - Do not interpret a facility record as necessarily equal to one independent real-world project.
          - Do not change status, capacity, governance, or relationship methodology silently.
          - Do not run task-specific `ingest-*`, `fix-*`, `seed-*`, migration, or recovery scripts merely because they exist.
          - Do not use Markdown-to-SQLite reverse sync in routine maintenance.
          - Preserve English/Chinese parity for user-facing structured content.
          - Keep methodology, tests, UI copy, and README claims aligned.

          ## 5. Standard workflow

          1. Inspect the current branch, recent merged PRs, open issues/PRs, CI status, dataset versions, and quality outputs.
          2. Classify the task and read the relevant documents.
          3. Verify external facts with primary sources when the task changes domain data.
          4. State the intended data or product behavior and identify affected outputs.
          5. Make the smallest coherent change through the authoritative source layer.
          6. Regenerate derived content when applicable.
          7. Run the validation sequence in `RUNBOOK.md`.
          8. Open a focused PR describing scope, methodology, evidence, risks, and validation.
          9. Merge only after CI passes and human review is satisfied.

          ## 6. Human approval required

          Obtain explicit approval before:

          - changing database schema or deleting structured records in bulk;
          - changing governance dimensions, score aggregation, Pipeline/Committed definitions, capacity methodology, or relationship-confidence semantics;
          - running reverse sync, recovery, destructive cleanup, or a non-idempotent migration;
          - replacing a major external source dataset;
          - adding a new autonomous skill or widening the agent's permissions;
          - performing a broad visual or information-architecture redesign outside the requested scope.

          ## 7. Completion standard

          A task is complete only when the authoritative source, generated outputs, tests, bilingual presentation, methodology documentation, and CI all agree. A successful command without a verified output is not evidence of completion.
          ''')

          write(agent / 'SKILL.md', r'''
          # CCUS Policy Hub | Domain Maintenance Skill

          ## Role

          Act as a CCUS policy, facility-data, governance, and web-product maintenance specialist. Convert evidence into structured, reproducible, bilingual updates without overstating certainty.

          ## Core competencies

          ### Policy intelligence

          - Identify the issuing authority, jurisdiction, legal status, publication date, scope, sectors, incentives, obligations, market mechanisms, strategy, and technical or MRV provisions.
          - Prefer enacted text and primary publications. Clearly distinguish law, regulation, strategy, consultation, guidance, funding programme, and draft proposal.
          - Preserve clause-level or source-level evidence for analytical claims.

          ### Facility intelligence

          - Maintain status, facility type, sector, carbon fate, operator, partners, hub, location precision, announcement/FID/operation timing, and project-record capacity.
          - Preserve unknown values as unknown. Do not infer exact coordinates, capacities, dates, or project-specific legal applicability without evidence.
          - Treat records as database observations; one real-world development can generate multiple records across capture, transport, storage, or full-chain categories.

          ### Governance benchmarking

          - Keep policy-level dimensions separate from country-level governance pillars and deployment metrics.
          - Preserve the documented score scale, aggregation rule, and evidence trail.
          - Treat visual comparisons as analytical aids, not legal advice or forecasts.

          ### Product maintenance

          - Maintain Chinese and English pages, charts, filters, accessibility, responsive behavior, public JSON endpoints, schemas, quality outputs, and documentation.
          - Use the existing visual system and shared components unless the task explicitly calls for a redesign.

          ## Evidence standard

          For each material data change, record or verify:

          - source URL or source dataset;
          - issuing organization or project owner;
          - publication or access date where available;
          - the exact fact supported by the source;
          - whether the value is reported, estimated, inferred, or unknown;
          - provenance author/reviewer/audit date required by the schema.

          Secondary sources may help discovery but should not override available primary evidence.

          ## Analytical guardrails

          - **Project-record capacity** is an aggregation of reported or estimated capacities attached to database records. It is not automatically net deliverable capture capacity or geological storage capacity.
          - **Pipeline** means Planned + Under construction + Operational records under the current homepage methodology.
          - **Committed** means Under construction + Operational records and is a subset of Pipeline.
          - **2026 snapshot** describes the current 2026 dataset state; it does not mean all displayed projects started in 2026.
          - Country-level facility-policy links provide jurisdictional context unless direct project-specific applicability evidence exists.
          - Coordinate precision must remain explicit: exact, subnational/approximate, country-level, or unknown.

          ## Update pattern

          1. Verify the evidence.
          2. Identify the authoritative table or source module.
          3. Apply a narrowly scoped change.
          4. Standardize enums and relationships when applicable.
          5. Run the deep audit before export.
          6. Regenerate Markdown, quality metrics, and public data as required.
          7. Validate the site and explain methodological consequences in the PR.

          Detailed commands are in `RUNBOOK.md`; approval boundaries are in `SAFETY.md`.
          ''')

          write(agent / 'ARCHITECTURE.md', r'''
          # CCUS Policy Hub | Architecture

          ## 1. System purpose

          CCUS Policy Hub combines a governed CCUS policy/facility dataset with a bilingual Astro website, analytical workspaces, public JSON endpoints, and an agent-readable maintenance layer.

          ## 2. Data and publication flow

          ```text
          Primary external evidence and approved source datasets
                                ↓
          agent/ccus-ai-agent/db/ccus_master.sqlite
                                ↓
          standardization · relationship repair · analytical computation
                                ↓
                    deep audit and quality gates
                                ↓
             ┌──────────────────┴──────────────────┐
             ↓                                     ↓
          src/content/ bilingual Markdown       public/data/ JSON + schemas
             ↓                                     ↓
             └──────────────────┬──────────────────┘
                                ↓
                    Astro build + Pagefind index
                                ↓
                         GitHub Pages release
          ```

          ## 3. Authority and generated outputs

          - `db/ccus_master.sqlite`: authoritative structured maintenance source.
          - `db/schema.sql`: schema reference for reproducible initialization and review.
          - `logic/manage.mjs`: canonical database maintenance CLI.
          - `src/content/policies`, `src/content/facilities`, `src/content/countries`: generated bilingual publication content.
          - `public/data/*.json`: generated AI-readable/public data endpoints.
          - `src/data/quality_metrics.generated.json` and `public/data/quality.json`: generated quality outputs.
          - `src/`: frontend source, shared components, page logic, styles, and translations.

          Data corrections start in SQLite or an approved import pipeline. UI and documentation changes start in their source files. Generated files are reviewed outputs, not independent maintenance sources.

          ## 4. Core domains

          ### Policies

          Structured identity, jurisdiction, year, status, category, legal weight, source, bilingual narrative, analytical dimensions, impact interpretation, evolution, regulatory context, relationships, and provenance.

          ### Facilities

          Record identity, country, status, capacity fields, coordinates and precision, bilingual technical/project metadata, partners, links, relationships, and provenance.

          ### Country governance profiles

          Bilingual summaries, seven regulatory pillars, strategic targets, governance/deployment metrics, and provenance.

          ### Public analytical layer

          Homepage capacity growth, 2026 project landscape, policy navigation, facility exploration, governance benchmarking, deployment comparison, quality dashboard, and AI-readable data interfaces.

          ## 5. Safe extension points

          - Add reusable tested logic under `logic/` and expose it through `manage.mjs` or an explicit package script.
          - Add one-off data transformations under `migrations/` with a manifest explaining input, output, idempotency, and approval requirements.
          - Add read-only diagnostics under a clearly named tools location or repository `scripts/`.
          - Add new public fields only with schema, generator, test, documentation, and backward-compatibility review.

          ## 6. GitHub workflow

          GitHub is the shared state and hand-off layer. Use focused branches and PRs, keep the web/GitHub workflow primary, use local execution only for environment-specific work, and require CI plus human review before merging.
          ''')

          write(agent / 'METHODOLOGY.md', r'''
          # CCUS Policy Hub | Methodology

          This document defines the analytical meanings that must remain consistent across SQLite, generated content, public data, charts, documentation, and user-facing copy.

          ## 1. Policy analysis

          Policy records distinguish identity and legal status from analytical interpretation. Current policy-level analytical dimensions are:

          - incentive;
          - statutory;
          - market;
          - strategic;
          - technical.

          Scores require evidence and must not be changed solely to improve a country's comparative position. A country governance profile is not the arithmetic identity of one policy score; it synthesizes evidence across the applicable policy framework.

          ## 2. Seven governance pillars

          Country profiles track:

          1. pore-space rights;
          2. liability transfer;
          3. liability period;
          4. financial assurance;
          5. permitting lead time;
          6. legal definition/classification of CO₂;
          7. cross-border rules.

          Empty, unknown, draft, and enacted positions must remain distinguishable. Concise labels do not replace source-backed narrative evidence.

          ## 3. Facility records

          A facility record represents one row in the maintained facility dataset. It may describe capture, transport, storage, transport-and-storage, utilization, or a full-chain development. Multiple records can relate to one wider project or hub.

          Therefore:

          - record counts are not guaranteed to equal unique real-world projects;
          - capacities across record types can overlap;
          - missing capacity records remain part of count-based analysis but contribute no Mtpa to capacity sums;
          - reported ranges and estimated capacities must remain distinguishable in provenance and raw fields.

          ## 4. Project-record capacity

          Project-record capacity is the sum of the selected capacity value attached to eligible database records under the current calculation rules. It supports directional comparison of the recorded pipeline. It must not be described as:

          - net deliverable capture capacity;
          - verified annual injection;
          - geological storage resource;
          - guaranteed future capacity.

          The relevant chart or documentation must disclose filters, eligible statuses, selected record types, year logic, and missing-data coverage.

          ## 5. Status and commitment

          Current homepage definitions are:

          ```text
          Pipeline = Planned + Under construction + Operational
          Committed = Under construction + Operational
          ```

          Committed is a subset of Pipeline. Cancelled, Suspended, and Decommissioned records are excluded from the active portfolio unless a specific analysis explicitly includes them.

          `Operational (2026)` and `Under construction (2026)` are current dataset snapshot labels, not historical statements about the status in every prior year.

          ## 6. Time logic

          Capacity-growth views use the documented record-year priority implemented by the active chart logic, generally operation year, then FID year, then announcement year where available. The 2026 Global Project Landscape is a current snapshot and must not be presented as a reconstructed historical status series.

          ## 7. Region and geography

          Regional aggregation uses the normalized region assigned to each facility record. Country-level or approximate coordinates are visualization aids, not verified site locations. Precision must be preserved and surfaced where relevant.

          ## 8. Facility-policy relationships

          Relationship strength depends on evidence:

          - direct project-specific applicability;
          - sector or programme relevance;
          - country-level jurisdictional context;
          - inferred/low-confidence association.

          Country-level association must not be worded as verified project-specific legal applicability.

          ## 9. Method changes

          Any change to dimensions, score scales, aggregation, capacity selection, status sets, year priority, region mapping, relationship confidence, or exclusions requires:

          - a methodology update;
          - focused tests;
          - user-facing copy review in both languages;
          - comparison with prior outputs;
          - explicit human approval in the PR.
          ''')

          write(agent / 'RUNBOOK.md', r'''
          # CCUS Policy Hub | Maintenance Runbook

          Run commands from the repository root with Node.js 20 and pnpm 9.

          ## 1. Establish current state

          Before editing:

          - inspect recent merged and open PRs;
          - check current CI and deployment status;
          - read `public/data/dataset-versions.json` and current quality outputs;
          - identify whether the task changes evidence, structured data, methodology, UI, or documentation;
          - create a focused branch.

          Do not use archived task documents as the current backlog.

          ## 2. Common commands

          ```bash
          pnpm install --frozen-lockfile
          pnpm manage:help
          pnpm lint
          pnpm test
          pnpm astro check
          pnpm manage:db:audit:deep
          pnpm manage:db:quality:export
          pnpm manage:db:data:export
          pnpm build
          ```

          ## 3. Policy or country-governance update

          1. Verify primary sources and capture provenance.
          2. Update SQLite through a reviewed, scoped ingestion or maintenance path.
          3. Run standardization and relationship/country-profile synchronization when affected.
          4. Run the deep audit.
          5. Export bilingual Markdown.
          6. Generate quality metrics and public JSON.
          7. Run tests, Astro check, and production build.
          8. Review English/Chinese parity and the relevant policy, country, Compare, and quality pages.

          Typical commands:

          ```bash
          pnpm manage:db:standardize
          pnpm manage:db:fix-relationships
          pnpm manage db:sync:country-profiles
          pnpm manage:db:audit:deep
          pnpm manage:db:export:md
          pnpm manage:db:quality:export
          pnpm manage:db:data:export
          ```

          ## 4. Facility dataset refresh

          The approved full refresh entry is:

          ```bash
          pnpm manage:db:import:iea:facilities -- <path-to-approved-workbook>
          ```

          The default local asset path may not exist in a fresh clone. Verify the workbook version, sheet, licensing/reuse conditions, field mapping, record-count delta, removed/added IDs, capacity changes, region normalization, and coordinate precision before writing.

          After import, run parity audit, deep audit, exports, public-data generation, tests, and build. Review headline homepage metrics and facility filters against the updated database.

          ## 5. Frontend or documentation update

          - Change source components, styles, translations, or Markdown directly.
          - Do not change metrics by hard-coding values that are derived from the database.
          - Keep Chinese and English pages aligned.
          - Add focused tests for logic, methodology, copy contracts, or visual structure where practical.
          - Validate at desktop, tablet, and mobile breakpoints for meaningful UI changes.

          ## 6. Generated outputs

          Regenerate outputs after structured data changes:

          ```bash
          pnpm manage:db:export:md
          pnpm manage:db:quality:export
          pnpm manage:db:data:export
          pnpm prettier --write public/data/*.json
          ```

          Review diffs for unexpected record churn, deleted bilingual files, changed IDs, or methodology drift.

          ## 7. High-risk recovery and migration

          Markdown-to-SQLite reverse sync and facility recovery are migration-only operations. Read `SAFETY.md`, create a database backup, run a dry run where available, inspect the diff, and obtain explicit approval before writing.

          ## 8. Pull request checklist

          A PR should state:

          - task and user-visible outcome;
          - authoritative sources and dataset version;
          - affected data tables/components/generated outputs;
          - methodology changes or confirmation that methodology is unchanged;
          - bilingual impact;
          - validation commands and CI result;
          - risks, rollback path, and any deferred cleanup.
          ''')

          write(agent / 'SAFETY.md', r'''
          # CCUS Policy Hub | Safety and Change Control

          ## 1. Risk levels

          ### Low risk

          - copy corrections;
          - README or runbook updates;
          - scoped styling and accessibility fixes;
          - tests that do not alter production behavior.

          These still require review and CI.

          ### Medium risk

          - adding or correcting individual policy/facility records;
          - changing relationships, translations, coordinates, capacities, or provenance;
          - changing data generators or public schemas compatibly;
          - adding a new chart using existing methodology.

          Require source evidence, targeted tests, generated-output review, and human PR review.

          ### High risk

          - schema changes;
          - bulk replacement or deletion;
          - reverse sync or database recovery;
          - source-dataset replacement;
          - methodology or scoring changes;
          - destructive cleanup;
          - widening agent permissions or adding autonomous skills.

          Require explicit approval before execution, a backup/rollback plan, dry-run or comparison evidence, and full CI.

          ## 2. Prohibited behavior

          - Fabricating data, citations, clauses, dates, coordinates, operators, capacities, or legal conclusions.
          - Treating generated Markdown/JSON as an independent source of truth for routine data maintenance.
          - Running an old country/batch/fix/seed script without confirming purpose, inputs, idempotency, and current compatibility.
          - Silently changing analytical definitions to make outputs look better.
          - Hiding missing data by substituting zero, a country centroid, or a guessed value without preserving the uncertainty semantics.
          - Declaring success because a command returned zero when the expected output was not inspected.
          - Merging with failing required CI.

          ## 3. Database precautions

          Before any high-risk write:

          1. confirm the current database and schema versions;
          2. create a recoverable backup outside the active path;
          3. confirm no active `.lock` or concurrent writer;
          4. run a dry run or generate a before/after report;
          5. inspect record counts, IDs, relationship counts, and key metrics;
          6. keep the change isolated in a branch and PR.

          Historical SQLite snapshots must not be placed beside the active SSOT with ambiguous names. Use external backup storage or clearly identified release artifacts.

          ## 4. Approval triggers

          Stop and request human approval when:

          - evidence sources conflict materially;
          - a source workbook would remove or rewrite a large share of records;
          - the intended operation is not represented in `RUNBOOK.md`;
          - a task-specific script is the only apparent implementation path;
          - generated diffs show unexplained broad churn;
          - a change affects legal interpretation, score methodology, capacity semantics, or public API compatibility.

          ## 5. Incident response

          On unexpected output:

          - stop further writes;
          - preserve logs and the before/after database state;
          - do not repair by editing generated files;
          - revert the branch or restore the approved backup;
          - document the root cause and add a regression test before retrying.
          ''')

          write(agent / 'DESIGN.md', r'''
          # CCUS Policy Hub | Agent Workspace Design Index

          > Status: compatibility entry point  
          > Version: 3.0  
          > Updated: 2026-07-19

          This file is retained because earlier repository documents and workflows link to `DESIGN.md`. The active maintenance contract is now split into focused documents so a general-purpose model can identify the applicable rule without reading a monolithic or outdated "constitution".

          ## Active documents

          - [`AGENTS.md`](./AGENTS.md): role, task routing, authority hierarchy, and completion standard.
          - [`SKILL.md`](./SKILL.md): CCUS domain and evidence skill.
          - [`ARCHITECTURE.md`](./ARCHITECTURE.md): data flow, repository structure, and extension points.
          - [`METHODOLOGY.md`](./METHODOLOGY.md): policy, facility, capacity, status, geography, relationship, and governance definitions.
          - [`RUNBOOK.md`](./RUNBOOK.md): commands, update workflows, validation, and PR checklist.
          - [`SAFETY.md`](./SAFETY.md): risk levels, approval triggers, prohibited operations, and recovery.

          ## Stable design principles

          1. Official external evidence establishes real-world facts.
          2. SQLite is the authoritative structured maintenance source inside the repository.
          3. Markdown, public JSON, quality metrics, and search indexes are generated outputs.
          4. Methodology must be explicit, tested, bilingual, and consistent across data and UI.
          5. GitHub branches, PRs, CI, and human review are the production control loop.
          6. Current work is tracked in GitHub, not in a static task file.

          There is no standing frontend design freeze. UI changes should be scoped, evidence-informed, consistent with the current visual system, tested, and approved through normal PR review.
          ''')

          write(agent / 'governance' / 'README.md', r'''
          # Governance Configuration and Generated Reports

          This directory contains quantitative governance configuration and generated audit outputs. It is not a second documentation authority; the active operating documents are in the parent directory.

          ## Active configuration

          - `audit_thresholds.json` defines quantitative minimums used by the audit pipeline.

          Changes to thresholds alter release behavior and require an explanation, before/after results, tests where applicable, and human approval.

          ## Generated reports

          - `reports/` contains audit, statistics, coordinate-governance, or quality outputs generated by maintenance commands.
          - Generated reports may be ignored by Git and should be regenerated from the current database rather than treated as permanent source documents.

          ## Source assets

          Large source workbooks may be provided locally and may not exist in a fresh clone. The current facility import script defaults to `agent/ccus-ai-agent/assets/IEA CCUS Projects Database 2026.xlsx`, but an agent must verify the actual supplied file, version, sheet, field mapping, and permission to use it before import.

          ## Archive

          Historical governance documents and task records are reference material only. They must not override `AGENTS.md`, `SKILL.md`, `ARCHITECTURE.md`, `METHODOLOGY.md`, `RUNBOOK.md`, or `SAFETY.md`.
          ''')

          write(agent / 'logic' / 'README.md', r'''
          # Logic Directory

          `manage.mjs` is the canonical database maintenance CLI. Prefer package scripts or documented `pnpm manage <command>` invocations over executing files in this directory directly.

          Reusable, active logic should be tested and connected to the canonical CLI or an explicit package script. Country-specific, batch-specific, `fix-*`, `seed-*`, ad hoc query, migration, and recovery files may remain for historical reproducibility, but their presence does not make them safe or current.

          Before running any non-canonical script, confirm:

          - its input source and version;
          - whether it writes to SQLite;
          - whether it is idempotent;
          - whether current schema and enums are supported;
          - whether a backup and explicit approval are required;
          - which audit, export, and tests must follow.

          Unknown CLI commands must fail with a non-zero exit code; a successful no-op is not an acceptable maintenance result.
          ''')

          write(agent / 'migrations' / 'README.md', r'''
          # Migrations

          This directory is reserved for one-off or versioned data transformations that are not part of routine maintenance.

          Every migration added here must include a short manifest stating:

          - purpose and date;
          - source and target schema/data version;
          - input files;
          - rows/tables affected;
          - idempotency and re-run policy;
          - dry-run or comparison command;
          - backup and rollback procedure;
          - required post-migration audits and exports;
          - approval status.

          Do not execute a migration solely because it exists. Routine changes should use the canonical CLI and reusable ingestion paths.
          ''')

          task_path = agent / 'TASKS.md'
          if task_path.exists():
              historical = task_path.read_text(encoding='utf-8')
              write(agent / 'archive' / '2026-04-task-history.md', f'''
              # Historical Task Snapshot — April 2026

              > Archived on 2026-07-19. This document records completed or superseded work and must not be used as the current task queue. Use current GitHub issues, pull requests, milestones, CI, dataset versions, and quality reports.

              ---

              {historical}
              ''')

          for stale in [
              agent / 'TASKS.md',
              agent / 'FINDINGS.md',
              agent / 'PROGRESS.md',
              agent / 'logic' / 'export-md-fixed.mjs',
          ]:
              if stale.exists():
                  stale.unlink()

          write(root / '.gitignore', r'''
          # --- Internal AI Context ---
          .gemini/
          .codex/
          skills/
          *.skill
          .worktrees/

          # --- CCUS maintenance agent product workspace ---
          agent/*
          !agent/ccus-ai-agent/

          agent/ccus-ai-agent/*
          !agent/ccus-ai-agent/AGENTS.md
          !agent/ccus-ai-agent/SKILL.md
          !agent/ccus-ai-agent/DESIGN.md
          !agent/ccus-ai-agent/ARCHITECTURE.md
          !agent/ccus-ai-agent/METHODOLOGY.md
          !agent/ccus-ai-agent/RUNBOOK.md
          !agent/ccus-ai-agent/SAFETY.md
          !agent/ccus-ai-agent/archive/
          !agent/ccus-ai-agent/archive/*.md
          !agent/ccus-ai-agent/migrations/
          !agent/ccus-ai-agent/migrations/*.md
          !agent/ccus-ai-agent/logic/
          !agent/ccus-ai-agent/governance/

          # Track the canonical CLI, active logic, and logic guidance.
          agent/ccus-ai-agent/logic/*
          !agent/ccus-ai-agent/logic/*.mjs
          !agent/ccus-ai-agent/logic/README.md

          # Keep schema and the active master database; ignore locks and ambiguous snapshots.
          !agent/ccus-ai-agent/db/
          agent/ccus-ai-agent/db/*
          !agent/ccus-ai-agent/db/schema.sql
          !agent/ccus-ai-agent/db/ccus_master.sqlite
          agent/ccus-ai-agent/db/.lock
          agent/ccus-ai-agent/db/*.tmp
          agent/ccus-ai-agent/db/*backup*.sqlite
          agent/ccus-ai-agent/db/*snapshot*.sqlite

          # Governance configuration is tracked; reports and legacy archives are generated/history.
          agent/ccus-ai-agent/governance/*
          !agent/ccus-ai-agent/governance/README.md
          !agent/ccus-ai-agent/governance/audit_thresholds.json
          agent/ccus-ai-agent/governance/reports/*
          agent/ccus-ai-agent/governance/archive/*

          # --- Background Tasks ---
          tasks/

          # --- Absolute Entry Points (Must be tracked) ---
          !agent.md
          !README.md
          !README.zh.md
          ''')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text(encoding='utf-8'))
          scripts = package['scripts']
          scripts.pop('manage:db:lint-governance', None)
          scripts.pop('manage:db:optimize', None)
          rebuilt = {}
          for key, value in scripts.items():
              rebuilt[key] = value
              if key == 'manage':
                  rebuilt['manage:help'] = 'node agent/ccus-ai-agent/logic/manage.mjs --help'
          package['scripts'] = rebuilt
          package_path.write_text(json.dumps(package, indent=2) + '\n', encoding='utf-8')

          manage_path = agent / 'logic' / 'manage.mjs'
          manage = manage_path.read_text(encoding='utf-8')
          marker = "const command = args[0];\n"
          if 'const AVAILABLE_COMMANDS =' not in manage:
              available = """const command = args[0];
          const AVAILABLE_COMMANDS = [
            'db:init',
            'db:import:i18n',
            'db:import:iea:links',
            'db:import:md:migration',
            'db:standardize',
            'db:standardize:region-zh',
            'db:standardize:policy-source',
            'db:geocode:facilities',
            'db:govern:facility-coordinates',
            'db:seed:countries',
            'db:sync:country-profiles',
            'db:fix-relationships',
            'db:audit:deep',
            'db:dict:lint',
            'db:export:i18n',
            'db:export:md',
            'db:export:schema-enums',
            'db:compute:maturity',
            'db:stats',
            'db:peek',
            'db:peek:raw',
            'db:pipeline',
            'db:clean',
          ];
          """
              if marker not in manage:
                  raise SystemExit('manage.mjs command marker not found')
              manage = manage.replace(marker, available, 1)

          switch_marker = "      switch (command) {\n        case 'db:init':"
          switch_replacement = """      switch (command) {
                case undefined:
                case 'help':
                case '--help':
                  console.log('CCUS maintenance commands:');
                  AVAILABLE_COMMANDS.forEach((name) => console.log(`  ${name}`));
                  break;
                case 'db:init':"""
          if switch_marker not in manage:
              raise SystemExit('manage.mjs switch marker not found')
          manage = manage.replace(switch_marker, switch_replacement, 1)

          default_marker = """        default:
                  console.log('Unknown command.');
          """
          default_replacement = """        default:
                  console.error(`Unknown command: ${command}`);
                  console.error('Run `pnpm manage:help` to list supported commands.');
                  exitCode = EXIT_CODES.INPUT_ERROR;
          """
          if default_marker not in manage:
              raise SystemExit('manage.mjs default marker not found')
          manage = manage.replace(default_marker, default_replacement, 1)
          manage_path.write_text(manage, encoding='utf-8')

          write(root / 'scripts' / 'agent-workspace.test.mjs', r'''
          import assert from 'node:assert/strict';
          import { spawnSync } from 'node:child_process';
          import fs from 'node:fs';
          import path from 'node:path';
          import test from 'node:test';
          import { fileURLToPath } from 'node:url';

          const root = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '..');
          const workspace = path.join(root, 'agent', 'ccus-ai-agent');

          test('agent workspace exposes the product maintenance contract', () => {
            for (const file of [
              'AGENTS.md',
              'SKILL.md',
              'ARCHITECTURE.md',
              'METHODOLOGY.md',
              'RUNBOOK.md',
              'SAFETY.md',
              'DESIGN.md',
            ]) {
              assert.equal(fs.existsSync(path.join(workspace, file)), true, file);
            }
          });

          test('stale task scratchpads and duplicate exporter are removed', () => {
            for (const file of [
              'TASKS.md',
              'FINDINGS.md',
              'PROGRESS.md',
              path.join('logic', 'export-md-fixed.mjs'),
            ]) {
              assert.equal(fs.existsSync(path.join(workspace, file)), false, file);
            }
            assert.equal(
              fs.existsSync(path.join(workspace, 'archive', '2026-04-task-history.md')),
              true
            );
          });

          test('unknown maintenance commands fail instead of succeeding silently', () => {
            const result = spawnSync(
              process.execPath,
              ['agent/ccus-ai-agent/logic/manage.mjs', 'not:a:real:command'],
              { cwd: root, encoding: 'utf8' }
            );
            assert.equal(result.status, 3, result.stderr || result.stdout);
            assert.match(result.stderr, /Unknown command/);
            assert.match(result.stderr, /manage:help/);
          });

          test('package scripts expose help and no retired no-op commands', () => {
            const pkg = JSON.parse(fs.readFileSync(path.join(root, 'package.json'), 'utf8'));
            assert.equal(typeof pkg.scripts['manage:help'], 'string');
            assert.equal('manage:db:lint-governance' in pkg.scripts, false);
            assert.equal('manage:db:optimize' in pkg.scripts, false);
          });
          ''')
          PY
      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            agent.md \
            agent/ccus-ai-agent/AGENTS.md \
            agent/ccus-ai-agent/SKILL.md \
            agent/ccus-ai-agent/ARCHITECTURE.md \
            agent/ccus-ai-agent/METHODOLOGY.md \
            agent/ccus-ai-agent/RUNBOOK.md \
            agent/ccus-ai-agent/SAFETY.md \
            agent/ccus-ai-agent/DESIGN.md \
            agent/ccus-ai-agent/archive/2026-04-task-history.md \
            agent/ccus-ai-agent/governance/README.md \
            agent/ccus-ai-agent/logic/README.md \
            agent/ccus-ai-agent/migrations/README.md \
            package.json \
            scripts/agent-workspace.test.mjs
      - name: Validate focused agent changes
        run: |
          node --test scripts/agent-workspace.test.mjs
          pnpm exec prettier --check agent.md agent/ccus-ai-agent/**/*.md package.json scripts/agent-workspace.test.mjs
      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(agent): productize CCUS maintenance workspace"
          git push
