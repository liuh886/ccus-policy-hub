name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: ESLint
        run: pnpm eslint .

      - name: Prettier Check
        run: pnpm prettier --check .

      - name: Test
        run: pnpm test

      - name: Astro Check
        run: pnpm astro check

      - name: Deep Audit (blocking)
        run: pnpm manage:db:audit:deep

      - name: Generate Quality Metrics
        run: pnpm manage:db:quality:export

      - name: Generate Public Data
        run: pnpm manage:db:data:export

      - name: Format Generated Data
        run: pnpm prettier --write public/data/*.json

      - name: Export Policy Markdown from SQLite
        run: |
          pnpm manage:db:export:policies
          pnpm prettier --write "src/content/policies/**/*.md"

      - name: Policy DB Consistency Audit
        run: pnpm manage:db:audit:policy-consistency

      - name: Format Policy Consistency Report
        if: always()
        run: |
          if [[ -f docs/policy-db-consistency-report.json ]]; then
            pnpm prettier --write \
              docs/policy-db-consistency-report.json \
              docs/policy-db-consistency-report.md
          fi

      - name: Upload Policy Projection Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-db-projections
          path: |
            src/content/policies
            public/data/policies.json
            docs/policy-db-consistency-report.json
            docs/policy-db-consistency-report.md
            .github/workflows/ci.yml
            .github/workflows/deploy.yml
            agent/ccus-ai-agent/logic/manage.mjs
            package.json
            scripts/audit-policy-artifact-consistency.mjs
            scripts/audit-policy-artifact-consistency.test.mjs
            scripts/export-policy-markdown.mjs
            scripts/run-policy-consistency-audit.mjs
            scripts/run-policy-consistency-audit.test.mjs
          if-no-files-found: error
          retention-days: 7

      - name: Build
        run: pnpm run build
