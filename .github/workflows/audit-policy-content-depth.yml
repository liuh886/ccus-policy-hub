name: Materialize policy content depth

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: >-
      github.head_ref == 'agent/policy-content-depth' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/policy-content-depth
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format migration controls
        run: |
          pnpm prettier --write \
            scripts/audit-policy-content-depth.mjs \
            scripts/audit-policy-content-depth.test.mjs \
            scripts/migrate-policy-content-depth-batch1-2026-07.mjs \
            scripts/migrate-policy-content-depth-batch1-2026-07.test.mjs \
            package.json

      - name: Validate migration logic
        run: |
          pnpm eslint .
          pnpm test

      - name: Apply DB-first enrichment
        run: pnpm manage:db:migrate:policy-content-depth-batch1

      - name: Regenerate policy-owned artifacts
        run: |
          pnpm manage:db:export:policies
          node agent/ccus-ai-agent/logic/manage.mjs db:audit:deep
          pnpm manage:db:quality:export
          pnpm manage:db:data:export
          git restore \
            public/data/facilities.json \
            public/data/dataset-versions.json
          pnpm manage:db:audit:policy-consistency
          pnpm manage:db:audit:policy-coverage
          pnpm manage:db:audit:policy-content-depth
          rm -f docs/policy-coverage-matrix.json
          pnpm prettier --write \
            "src/content/policies/**/*.md" \
            public/data/policies.json \
            public/data/countries.json \
            public/data/quality.json \
            public/data/manifest.json \
            src/data/quality_metrics.generated.json \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md \
            docs/policy-coverage-matrix.md \
            docs/policy-content-depth-report.json \
            docs/policy-content-depth-report.md

      - name: Validate synchronized outputs
        run: |
          pnpm manage:db:audit:policy-consistency
          node scripts/sync-policy-link-projections.mjs
          pnpm test
          pnpm astro check
          pnpm run build

      - name: Enforce policy-only boundary
        run: |
          {
            git diff --name-only
            git ls-files --others --exclude-standard
          } | sort -u | tee policy-content-materialization-diff.txt
          forbidden=0
          while IFS= read -r file; do
            case "$file" in
              package.json|agent/ccus-ai-agent/db/ccus_master.sqlite|docs/policy-content-depth-report.json|docs/policy-content-depth-report.md|docs/policy-db-consistency-report.json|docs/policy-db-consistency-report.md|docs/policy-coverage-matrix.md|public/data/policies.json|public/data/countries.json|public/data/quality.json|public/data/manifest.json|src/data/quality_metrics.generated.json|scripts/audit-policy-content-depth.mjs|scripts/audit-policy-content-depth.test.mjs|scripts/migrate-policy-content-depth-batch1-2026-07.mjs|scripts/migrate-policy-content-depth-batch1-2026-07.test.mjs|src/content/policies/en/cn-ccus-roadmap-2025.md|src/content/policies/en/cn-pboc-cerf.md|src/content/policies/en/cn-standards-2024.md|src/content/policies/en/eu-cbam.md|src/content/policies/en/eu-innovation-fund.md|src/content/policies/en/us-45q-ira.md|src/content/policies/en/ipcc-guidelines.md|src/content/policies/en/verra-vm0049.md|src/content/policies/zh/cn-ccus-roadmap-2025.md|src/content/policies/zh/cn-pboc-cerf.md|src/content/policies/zh/cn-standards-2024.md|src/content/policies/zh/eu-cbam.md|src/content/policies/zh/eu-innovation-fund.md|src/content/policies/zh/us-45q-ira.md|src/content/policies/zh/ipcc-guidelines.md|src/content/policies/zh/verra-vm0049.md|policy-content-materialization-diff.txt)
                ;;
              *)
                echo "Forbidden non-policy change: $file"
                forbidden=1
                ;;
            esac
          done < policy-content-materialization-diff.txt
          git diff --quiet -- src/content/facilities public/data/facilities.json || {
            echo 'Facility projections changed unexpectedly'
            forbidden=1
          }
          exit "$forbidden"

      - name: Commit verified enrichment
        id: commit_enrichment
        if: success()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          set +e
          git add -f \
            package.json \
            agent/ccus-ai-agent/db/ccus_master.sqlite \
            docs/policy-content-depth-report.json \
            docs/policy-content-depth-report.md \
            docs/policy-db-consistency-report.json \
            docs/policy-db-consistency-report.md \
            docs/policy-coverage-matrix.md \
            public/data/policies.json \
            public/data/countries.json \
            public/data/quality.json \
            public/data/manifest.json \
            src/data/quality_metrics.generated.json \
            scripts/audit-policy-content-depth.mjs \
            scripts/audit-policy-content-depth.test.mjs \
            scripts/migrate-policy-content-depth-batch1-2026-07.mjs \
            scripts/migrate-policy-content-depth-batch1-2026-07.test.mjs \
            src/content/policies 2>&1 | tee add-output.txt
          add_status=${PIPESTATUS[0]}
          if (( add_status != 0 )); then
            exit "$add_status"
          fi
          if git diff --cached --quiet; then
            echo "No verified enrichment changes to commit." | tee commit-output.txt
            exit 0
          fi
          git commit --no-verify -m "feat(data): deepen priority policy pages" 2>&1 | tee commit-output.txt
          commit_status=${PIPESTATUS[0]}
          if (( commit_status != 0 )); then
            exit "$commit_status"
          fi
          git push origin HEAD:agent/policy-content-depth 2>&1 | tee push-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-content-depth-materialization
          path: |
            policy-content-materialization-diff.txt
            add-output.txt
            commit-output.txt
            push-output.txt
            docs/policy-content-depth-report.json
            docs/policy-content-depth-report.md
            docs/policy-db-consistency-report.md
          if-no-files-found: warn
          retention-days: 7

      - name: Fail on commit error
        if: steps.commit_enrichment.outcome == 'failure'
        run: exit 1
