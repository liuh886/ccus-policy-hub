name: Format PR27

on:
  push:
    branches:
      - refactor/light-first-editorial-ui

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/light-first-editorial-ui
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format visual files
        run: >-
          pnpm exec prettier --write
          src/layouts/Layout.astro
          src/styles/light-editorial.css
          src/styles/light-editorial-capacity.css
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/layouts/Layout.astro src/styles/light-editorial.css src/styles/light-editorial-capacity.css
          git commit -m "style(ui): format light editorial styles"
          git push origin HEAD:refactor/light-first-editorial-ui
